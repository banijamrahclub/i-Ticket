<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i Ticket للسفر والسياحة | وجهتك المثالية للاكتشاف</title>
    <link rel="stylesheet" href="style.css?v=1.6">
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/574253881_18532941568039264_5622425311968020289_n.jpg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #003a5d;
            --accent-teal: #eef9f9;
            --primary-red: #e63946;
            --card-border: #e6e6e6;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden;
        }

        .outfit { font-family: 'Outfit', sans-serif; }

        header {
            background: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        header .logo img { height: 60px; object-fit: contain; }

        .welcome-hero {
            background: #fff5f5;
            padding: 30px 20px 80px;
            text-align: right;
            position: relative;
        }

        .welcome-hero h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 5px;
            color: var(--primary-red);
        }

        .welcome-hero p { font-size: 0.9rem; color: #666; margin: 0; }

        .user-avatar {
            position: absolute;
            left: 20px;
            top: 30px;
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .choices-wrapper {
            padding: 0 20px;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }

        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .choice-item {
            background: #fff;
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--text-dark);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            border: 1px solid var(--card-border);
            transition: 0.2s;
        }

        .choice-item i {
            display: block;
            font-size: 2.22rem;
            margin-bottom: 12px;
            color: var(--primary-red);
        }

        .choice-item span { font-size: 0.95rem; font-weight: 700; }

        .offers-section { padding: 35px 0 20px; }
        .section-header {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h2 { font-size: 1.1rem; margin: 0; color: var(--text-dark); font-weight: 800; }
        .section-header .see-all { color: var(--primary-red); font-size: 0.85rem; text-decoration: none; font-weight: 700; }

        .offers-track {
            display: flex;
            gap: 15px;
            padding: 0 20px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .offers-track::-webkit-scrollbar { display: none; }

        /* More Services */
        .services-row {
            padding: 0 20px 40px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .services-row::-webkit-scrollbar { display: none; }

        .service-mini { text-align: center; min-width: 65px; }
        .icon-circle {
            width: 65px;
            height: 65px;
            background: #fff5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-red);
            font-size: 1.4rem;
            margin-bottom: 8px;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .service-mini span { font-size: 0.75rem; color: #555; font-weight: 700; }

        .grid-section { padding: 20px; }
        
        /* Premium Aesthetics & Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            opacity: 1 !important;
            transform: none !important;
            transition: none !important;
            visibility: visible !important;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .choice-item {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04) !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        .choice-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(230, 57, 70, 0.12) !important;
            border-color: var(--primary-red) !important;
            background: #fff !important;
        }

        .choice-item i {
            transition: transform 0.4s ease;
        }

        .choice-item:hover i {
            transform: scale(1.2) rotate(5deg);
        }

        .see-all {
            padding: 8px 16px;
            background: var(--accent-teal);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .see-all:hover {
            background: var(--primary-red);
            color: #fff !important;
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.2);
        }

        .welcome-hero {
            background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
            overflow: hidden;
        }

        .welcome-hero::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(230, 57, 70, 0.05) 0%, transparent 70%);
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <header id="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/574253881_18532941568039264_5622425311968020289_n.jpg" alt="i Ticket Logo">
        </div>
    </header>

    <div class="welcome-hero">
        <div class="user-avatar"><i class="fa-solid fa-plane-departure" style="color: var(--primary-red);"></i></div>
        <h1 class="outfit">Hello Explorers!</h1>
        <p>اكتشف وجهتك القادمة مع i Ticket</p>
    </div>

    <!-- Categories -->
    <section class="categories-section">
        <div id="categories-container" class="categories-container">
            <!-- التصنيفات ستظهر هنا -->
        </div>
    </section>

    <div class="choices-wrapper">
        <div class="choices-grid" id="main-choices-grid">
            <!-- سيتم ملؤه ديناميكياً بواسطة JS -->
        </div>
    </div>

    <!-- Special Offers Slider -->
    <section class="offers-section" id="offers-section" style="display: none;">
        <div class="offers-header">
            <h2 class="Cairo">عروض مميزة منا لك</h2>
            <a href="#" class="view-more Cairo">عرض المزيد</a>
        </div>
        <div class="offers-container" id="offers-wrapper">
            <!-- العروض ستظهر هنا كبطاقات -->
        </div>
    </section>

    <!-- تم إزالة قسم أحدث الرحلات بناءً على طلب المستخدم -->

    <section class="grid-section" id="trips-section">
        <div class="section-header" style="padding: 0; margin-bottom: 20px;">
            <h2>استكشف كافة الرحلات</h2>
        </div>

        <div id="category-filter-bar" class="category-filter-container" style="justify-content: flex-start; padding: 5px 0;"></div>
        <div class="package-grid" id="main-package-grid"></div>
    </section>

    <div class="fixed-social-bar">
        <a href="https://wa.me/97317550054" target="_blank"><i class="fa-brands fa-whatsapp"></i> <span>واتساب</span></a>
        <a href="https://www.instagram.com/iticket.bh/" target="_blank"><i class="fa-brands fa-instagram"></i> <span>انستقرام</span></a>
        <a href="https://www.tiktok.com/@iticket.bh" target="_blank"><i class="fa-brands fa-tiktok"></i> <span>تيك توك</span></a>
    </div>

    <a href="https://wa.me/97317550054" class="whatsapp-float">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>window.BRAND = 'iticket';</script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // تصفير أي محاولة للإخفاء
            document.querySelectorAll('.reveal').forEach(el => {
                el.classList.add('active');
                el.style.opacity = '1';
                el.style.transform = 'none';
            });
        });
    </script>
</body>
</html>
