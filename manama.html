<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manama Holidays | فنادق وشاليهات واستراحات البحرين</title>
    <link rel="stylesheet" href="style.css?v=1.5">
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/Screenshot%202026-03-03%20001253.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #e31e24; /* نفس لون إي تكت */
            --accent-red: #fff5f5;
            --soft-gray: #f8f9fa;
            --card-border: #e6e6e6;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden;
        }

        .reveal {
            opacity: 1 !important;
            transform: none !important;
            transition: none !important;
            visibility: visible !important;
        }

        /* Almosafer Style Header */
        header {
            background: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        header .logo img { height: 60px; object-fit: contain; }

        /* Welcome Section */
        .welcome-hero {
            background: var(--accent-red);
            padding: 30px 20px 80px;
            text-align: right;
            position: relative;
        }

        .welcome-hero h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 5px;
            color: var(--primary-red);
        }

        .welcome-hero p {
            font-size: 0.9rem;
            color: #666;
            margin: 0;
        }

        .user-avatar {
            position: absolute;
            left: 20px;
            top: 30px;
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        /* Category Choice Grid (Floating) */
        .choices-wrapper {
            padding: 0 20px;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .choice-item {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--primary-red);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .choice-item:hover { 
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(91, 192, 222, 0.12) !important;
            border-color: #5bc0de !important;
            background: #fff !important;
        }

        .choice-item i {
            display: block;
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: #5bc0de;
            transition: transform 0.4s ease;
        }

        .choice-item:hover i {
            transform: scale(1.2) rotate(-5deg);
        }

        .item-badge {
            position: absolute;
            top: -10px;
            right: 15px;
            background: #4caf50;
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .choice-item i {
            display: block;
            font-size: 2.22rem;
            margin-bottom: 12px;
            color: var(--primary-red);
        }

        .choice-item span {
            font-size: 0.95rem;
            font-weight: 700;
        }

        /* Large Offer Cards (Horizontal Scroll) */
        .offers-section {
            padding: 35px 0 20px;
        }

        .section-header {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h2 { font-size: 1.1rem; margin: 0; color: var(--primary-red); font-weight: 800; }
        .section-header .see-all { color: var(--primary-red); font-size: 0.85rem; text-decoration: none; font-weight: 700; }

        .offers-track {
            display: flex;
            gap: 15px;
            padding: 0 20px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .offers-track::-webkit-scrollbar { display: none; }

        .offer-banner {
            min-width: 300px;
            width: 300px;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--card-border);
            cursor: pointer;
        }

        .offer-img { height: 160px; position: relative; }
        .offer-img img { width: 100%; height: 100%; object-fit: cover; }
        .promo-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--primary-red);
            font-weight: 700;
            border: 1px solid #ddd;
        }

        .offer-info { padding: 15px; }
        .offer-info h4 { margin: 0 0 5px; font-size: 0.95rem; color: var(--primary-red); }
        .offer-info p { margin: 0; font-size: 0.8rem; color: #666; line-height: 1.4; }

        /* More Services (Circle Icons) */
        .services-row {
            padding: 0 20px 40px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .services-row::-webkit-scrollbar { display: none; }

        .service-mini {
            text-align: center;
            min-width: 65px;
        }

        .icon-circle {
            width: 65px;
            height: 65px;
            background: var(--accent-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-red);
            font-size: 1.4rem;
            margin-bottom: 8px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .service-mini span { font-size: 0.75rem; color: #555; font-weight: 700; }

        /* Grid section reset */
        .grid-section { background: #fff; padding: 20px; }

        /* Premium Aesthetics & Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            opacity: 1 !important;
            transform: none !important;
        }

        .see-all {
            padding: 8px 16px;
            background: var(--accent-red);
            border-radius: 20px;
            transition: all 0.3s ease;
            color: var(--primary-red) !important;
        }

        .see-all:hover {
            background: var(--primary-red);
            color: #fff !important;
            box-shadow: 0 4px 12px rgba(0, 58, 93, 0.2);
        }

        .welcome-hero {
            background: linear-gradient(135deg, var(--accent-red) 0%, #fff 100%);
            overflow: hidden;
        }
    </style>
</head>

<body>

    <header id="main-header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/Screenshot%202026-03-03%20001253.png" alt="Manama Logo">
        </div>
    </header>

    <div class="welcome-hero">
        <div class="user-avatar"><i class="fa-solid fa-suitcase" style="color: var(--primary-red);"></i></div>
        <h1>مرحباً بك</h1>
        <p>ماذا ينتظرك لاكتشافه اليوم؟</p>
    </div>

    <!-- Categories -->
    <section class="categories-section">
        <div id="categories-container" class="categories-container">
            <!-- التصنيفات ستظهر هنا -->
        </div>
    </section>

    <div class="choices-wrapper">
        <div class="choices-grid" id="main-choices-grid">
            <!-- سيتم ملؤه ديناميكياً بواسطة JS -->
        </div>
    </div>

    <!-- Special Offers Slider -->
    <section class="offers-section" id="offers-section" style="display: none;">
        <div class="offers-header">
            <h2 class="Cairo">عروض مميزة منا لك</h2>
            <a href="#" class="view-more Cairo">عرض المزيد</a>
        </div>
        <div class="offers-container" id="offers-wrapper">
            <!-- العروض ستظهر هنا كبطاقات -->
        </div>
    </section>

    <!-- تم إزالة قسم أحدث الأماكن بناءً على طلب المستخدم -->

    <section class="grid-section" id="services-section">
        <div class="section-header" style="padding: 0; margin-bottom: 20px;">
            <a href="#main-package-grid" class="see-all">عرض الكل</a>
            <h2>استكشف كافة الخدمات</h2>
        </div>
        <div class="services-row">
            <div class="service-mini">
                <div class="icon-circle"><i class="fa-solid fa-ellipsis"></i></div>
                <span>المزيد</span>
            </div>
            <div class="service-mini">
                <div class="icon-circle"><i class="fa-solid fa-car-side"></i></div>
                <span>مواصلات</span>
            </div>
            <div class="service-mini">
                <div class="icon-circle"><i class="fa-solid fa-phone-volume"></i></div>
                <span>دعم 24/7</span>
            </div>
        </div>

        <div id="category-filter-bar" class="category-filter-container" style="justify-content: flex-start; padding: 5px 0;"></div>
        <div class="package-grid" id="main-package-grid"></div>
    </section>


    <div class="fixed-social-bar">
        <a href="https://wa.me/97313313100" target="_blank"><i class="fa-brands fa-whatsapp"></i> <span>واتساب</span></a>
        <a href="https://www.instagram.com/manama_holidays" target="_blank"><i class="fa-brands fa-instagram"></i> <span>انستقرام</span></a>
    </div>

    <a href="https://wa.me/97313313100" class="whatsapp-float" target="_blank" style="background: #e02b20;">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>window.BRAND = 'manama';</script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                el.classList.add('active');
                el.style.opacity = '1';
                el.style.transform = 'none';
            });
        });
    </script>
</body>
</html>
