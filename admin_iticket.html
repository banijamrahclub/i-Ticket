<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم i Ticket | إدارة الرحلات</title>
    <script>
        (function() {
            if (sessionStorage.getItem('admin_pass') === '1357') return;
            document.documentElement.style.visibility = 'hidden';
            window.addEventListener('DOMContentLoaded', () => {
                const overlay = document.createElement('div');
                overlay.id = 'admin-lock-overlay';
                overlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:99999;color:white;font-family:Cairo,sans-serif;';
                overlay.innerHTML = `
                    <div style="background:#111;padding:40px;border-radius:24px;border:1px solid #e63946;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);max-width:400px;width:90%;">
                        <i class="fa fa-lock" style="font-size:3rem;color:#e63946;margin-bottom:20px;"></i>
                        <h2 style="margin-bottom:10px;">منطقة محمية</h2>
                        <p style="color:#888;margin-bottom:25px;">يرجى إدخال كلمة المرور للمتابعة</p>
                        <input type="password" id="admin-pass-input" placeholder="••••" style="width:100%;padding:15px;background:#222;border:1px solid #333;border-radius:12px;color:white;text-align:center;font-size:1.5rem;letter-spacing:5px;margin-bottom:20px;outline:none;box-sizing:border-box;">
                        <button onclick="checkAdminPass()" style="width:100%;padding:15px;background:#e63946;color:white;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:1.1rem;transition:0.3s;">دخول النظام</button>
                        <p id="lock-error" style="color:#e63946;margin-top:15px;display:none;">كلمة المرور غير صحيحة!</p>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.documentElement.style.visibility = 'visible';
                window.checkAdminPass = () => {
                    const val = document.getElementById('admin-pass-input').value;
                    if (val === '1357') {
                        sessionStorage.setItem('admin_pass', '1357');
                        overlay.remove();
                    } else {
                        document.getElementById('lock-error').style.display = 'block';
                        document.getElementById('admin-pass-input').value = '';
                    }
                };
                document.getElementById('admin-pass-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAdminPass();
                });
            });
        })();
    </script>
    <link rel="stylesheet" href="style.css?v=1.5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            overflow-x: auto !important;
            overflow-y: auto !important;
        }

        .admin-container {
            padding: 40px 5%;
            margin-top: 80px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-add {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: var(--dark-red);
            transform: translateY(-2px);
        }

        .trips-table-container {
            background: var(--card-bg);
            border-radius: 20px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-overflow-scrolling: touch;
            display: block;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th,
        td {
            padding: 20px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            color: var(--text-gray);
            font-weight: 400;
        }

        .trip-img-mini {
            width: 60px;
            height: 40px;
            border-radius: 5px;
            object-fit: cover;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            color: #3498db;
            cursor: pointer;
            background: rgba(52, 152, 219, 0.1);
            padding: 8px;
            border-radius: 8px;
        }

        .btn-delete {
            color: #e74c3c;
            cursor: pointer;
            background: rgba(231, 76, 60, 0.1);
            padding: 8px;
            border-radius: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: flex-start;
            backdrop-filter: blur(5px);
            overflow-y: auto;
            padding: 20px 0;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            border: 1px solid var(--primary-red);
            margin: auto;
            position: relative;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gray);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

    <script>
        let iticketCategories = [];

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                if (config.iticket_desc) document.getElementById('brand-desc-input').value = config.iticket_desc;
                
                iticketCategories = config.iticket_categories || [
                    { id: 'flight_tickets', label: 'تذاكر طيران', icon: 'fa-plane' },
                    { id: 'group_trips', label: 'رحلات جماعية', icon: 'fa-users' },
                    { id: 'individual_trips', label: 'رحلات فردية', icon: 'fa-user' },
                    { id: 'religious', label: 'رحلات دينية', icon: 'fa-mosque' },
                    { id: 'visas', label: 'تأشيرات', icon: 'fa-stamp' }
                ];
                iticketOffers = config.iticket_offers || [];
                renderCategoryManagement();
                renderOffersManagement();
                populateTypeDropdown();
            } catch (e) { console.error(e); }
        }

        let iticketOffers = [];
        let editingOfferIdx = null;

        function renderOffersManagement() {
            const tbody = document.getElementById('offers-list-tbody');
            if(!tbody) return;
            
            tbody.innerHTML = iticketOffers.length === 0 ? `<tr><td colspan="4" style="text-align:center; padding:30px; color:#666;">لا توجد عروض مضافة حالياً</td></tr>` : 
            iticketOffers.map((off, idx) => `
                <tr style="border-bottom: 1px solid #222;">
                    <td style="padding: 12px;"><img src="${off.image}" style="width:60px; height:40px; object-fit:cover; border-radius:6px;"></td>
                    <td style="padding: 12px; color:white;">${off.title || 'بدون عنوان'}</td>
                    <td style="padding: 12px;">
                        <button onclick="toggleOfferVisibility(${idx})" style="background:none; border:none; color:${off.hidden ? '#888' : '#2ecc71'}; cursor:pointer; margin-left:10px;" title="${off.hidden ? 'إظهار' : 'إخفاء'}">
                            <i class="fa ${off.hidden ? 'fa-eye-slash' : 'fa-eye'}"></i> 
                            <span style="font-size:0.85rem; margin-right:5px;">${off.hidden ? 'مخفي' : 'ظاهر'}</span>
                        </button>
                    </td>
                    <td style="padding: 12px;">
                        <button onclick="openOfferModal(${idx})" style="background:none; border:none; color:#f1c40f; cursor:pointer; margin-left:10px;"><i class="fa fa-edit"></i> تعديل</button>
                        <button onclick="deleteOffer(${idx})" style="background:none; border:none; color:#e74c3c; cursor:pointer;"><i class="fa fa-trash"></i> حذف</button>
                    </td>
                </tr>
            `).join('');
}

async function toggleOfferVisibility(idx) {
    iticketOffers[idx].hidden = !iticketOffers[idx].hidden;
    await syncOffersWithServer();
}

        function getTripName(id) {
            if(!id) return 'لا يوجد';
            const trip = (window.allTrips || []).find(t => t.id == id);
            return trip ? trip.name : 'رحلة محذوفة';
        }

        function openOfferModal(idx = null) {
            editingOfferIdx = idx;
            const modal = document.getElementById('offer-modal');
            const title = document.getElementById('offer-modal-title');
            const select = document.getElementById('offer-trip-select');
            
            // Populate Trip Dropdown
            select.innerHTML = '<option value="">لا يوجد ارتباط</option>' + 
                (window.allTrips || []).map(t => `<option value="${t.id}">${t.name}</option>`).join('');

            if(idx !== null) {
                const off = iticketOffers[idx];
                title.innerText = 'تعديل العرض';
                document.getElementById('offer-title-input').value = off.title || '';
                document.getElementById('offer-sub-input').value = off.subtitle || '';
                document.getElementById('offer-trip-select').value = off.tripId || '';
                document.getElementById('offer-modal-img').src = off.image;
                document.getElementById('offer-modal-img').style.display = 'block';
                document.getElementById('offer-placeholder-text').style.display = 'none';
            } else {
                title.innerText = 'إضافة عرض جديد';
                document.getElementById('offer-title-input').value = '';
                document.getElementById('offer-sub-input').value = '';
                document.getElementById('offer-trip-select').value = '';
                document.getElementById('offer-modal-img').style.display = 'none';
                document.getElementById('offer-placeholder-text').style.display = 'block';
            }
            modal.style.display = 'flex';
        }

        function closeOfferModal() {
            document.getElementById('offer-modal').style.display = 'none';
        }

        function previewOfferImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('offer-modal-img');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('offer-placeholder-text').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveOfferFromModal() {
            const title = document.getElementById('offer-title-input').value.trim();
            const sub = document.getElementById('offer-sub-input').value.trim();
            const tripId = document.getElementById('offer-trip-select').value;
            const img = document.getElementById('offer-modal-img').src;

            if(!img || img.includes('placeholder')) return alert('يرجى اختيار صورة للعرض');
            if(!title) return alert('يرجى إدخال عنوان للعرض');

            const offerData = { image: img, title, subtitle: sub, tripId };

            if(editingOfferIdx !== null) {
                iticketOffers[editingOfferIdx] = offerData;
            } else {
                iticketOffers.push(offerData);
            }

            await syncOffersWithServer();
            closeOfferModal();
        }

        async function deleteOffer(idx) {
            if(!confirm('هل أنت متأكد من حذف هذا العرض؟')) return;
            iticketOffers.splice(idx, 1);
            await syncOffersWithServer();
        }

        async function syncOffersWithServer() {
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ iticket_offers: iticketOffers })
                });
                if (res.ok) {
                    renderOffersManagement();
                }
            } catch (e) { console.error(e); }
        }

        function guessIcon(label) {
            const l = label.toLowerCase();
            if (l.includes('طيران') || l.includes('تذاكر') || l.includes('سفر')) return 'fa-plane-departure';
            if (l.includes('فندق') || l.includes('فنادق') || l.includes('منتجع')) return 'fa-hotel';
            if (l.includes('شاليه') || l.includes('استراحة') || l.includes('مزرعة')) return 'fa-house-chimney';
            if (l.includes('بحر') || l.includes('شاطئ') || l.includes('بحرية')) return 'fa-umbrella-beach';
            if (l.includes('دينية') || l.includes('مكة') || l.includes('مدينة') || l.includes('عمرة')) return 'fa-mosque';
            if (l.includes('جماعية') || l.includes('عائلة') || l.includes('شباب')) return 'fa-users';
            if (l.includes('فردية') || l.includes('شخص')) return 'fa-user';
            if (l.includes('خيل') || l.includes('ركوب')) return 'fa-horse';
            if (l.includes('سيارة') || l.includes('مواصلات')) return 'fa-car';
            if (l.includes('عشاء') || l.includes('مطعم')) return 'fa-utensils';
            if (l.includes('جاكوزي') || l.includes('مسبح')) return 'fa-hot-tub-person';
            if (l.includes('غوص') || l.includes('سمك')) return 'fa-fish';
            if (l.includes('عرض') || l.includes('عروض')) return 'fa-tags';
            if (l.includes('تأشير') || l.includes('فيزا')) return 'fa-stamp';
            if (l.includes('تنسيق') || l.includes('ترتيب')) return 'fa-cake-candles';
            return 'fa-location-dot'; // Default better icon
        }

        function renderCategoryManagement() {
            const container = document.getElementById('categories-manage-container');
            if(!container) return;
            container.innerHTML = `
                <div style="color: #888; font-size: 0.8rem;">اسم التصنيف</div>
                <div></div>
            ` + iticketCategories.map((cat, idx) => `
                <div style="position:relative;">
                    <input type="text" class="cat-label cat-input" value="${cat.label}" placeholder="ادخل اسم التصنيف...">
                    <input type="hidden" class="cat-id" value="${cat.id}">
                    <input type="hidden" class="cat-icon" value="${cat.icon || 'fa-circle-dot'}">
                </div>
                <button onclick="removeCategoryRow(${idx})" style="background:rgba(231, 76, 60, 0.1); color:#e74c3c; border:none; border-radius:12px; padding:0 20px; cursor:pointer;"><i class="fa fa-trash"></i></button>
            `).join('');
        }

        function addNewCategoryRow() {
            iticketCategories.push({ id: '', label: '', icon: 'fa-circle-dot' });
            renderCategoryManagement();
        }

        function removeCategoryRow(idx) {
            if (iticketCategories.length <= 1) return alert('يجب وجود تصنيف واحد على الأقل');
            iticketCategories.splice(idx, 1);
            renderCategoryManagement();
        }

        async function saveCategories() {
            const btn = document.getElementById('save-cats-btn');
            const labels = document.querySelectorAll('.cat-label');
            const ids = document.querySelectorAll('.cat-id');
            const icons = document.querySelectorAll('.cat-icon');
            
            const updatedCats = [];
            for(let i=0; i<labels.length; i++) {
                let label = labels[i].value.trim();
                if(!label) continue;
                let id = ids[i].value || 'tc_' + Math.random().toString(36).substr(2, 9);
                let icon = icons[i].value;
                if (!icon || icon === 'fa-circle-dot') {
                    icon = guessIcon(label);
                }
                updatedCats.push({ label, id, icon });
            }

            btn.disabled = true;
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ iticket_categories: updatedCats })
                });
                if (res.ok) {
                    alert('تم الحفظ بنجاح');
                    iticketCategories = updatedCats;
                    renderCategoryManagement();
                    populateTypeDropdown();
                }
            } catch (e) { alert(e); }
            finally { btn.disabled = false; }
        }

        function populateTypeDropdown() {
            const select = document.getElementById('trip-type');
            if(!select) return;
            select.innerHTML = iticketCategories.map(cat => `<option value="${cat.id}">${cat.label}</option>`).join('');
            window.iticketCategories = iticketCategories; // For admin.js
        }

        async function saveBrandDesc() {
            const btn = document.getElementById('save-desc-btn');
            const desc = document.getElementById('brand-desc-input').value;
            btn.disabled = true;
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ iticket_desc: desc })
                });
                if (res.ok) alert('تم حفظ الوصف بنجاح');
            } catch (e) { alert(e); }
            finally { btn.disabled = false; }
        }

        window.addEventListener('DOMContentLoaded', loadConfig);
    </script>

    <script>window.BRAND = 'iticket';</script>
    <script src="admin.js"></script>
</body>

</html>
