<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i Ticket & Manama Holidays | منصة الحجز المتكاملة</title>
    <link rel="stylesheet" href="style.css?v=1.6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Outfit:wght@300;600;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/FINAL_LOGO%20copy-1.png">
    <style>
        :root {
            --primary-red: #e63946;
            --manama-gold: #d4af37;
            --light-bg: #f8f9fa;
            /* لون أبيض مريح للعين */
            --card-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #666;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 40px 0;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }

        .welcome-container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .welcome-title {
            font-size: 2.5rem;
            margin-bottom: 50px;
            font-weight: 800;
            color: var(--text-dark);
            animation: fadeInDown 1s ease;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .choice-card {
            background: var(--card-white);
            border-radius: 30px;
            padding: 50px 30px;
            text-decoration: none;
            color: var(--text-dark);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* i Ticket Theme */
        .card-iticket:hover {
            border-color: var(--primary-red);
            box-shadow: 0 20px 60px rgba(230, 57, 70, 0.15);
            transform: translateY(-10px) scale(1.02);
        }

        .card-iticket .brand-btn {
            background: var(--primary-red);
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
        }

        /* Manama Theme */
        .card-manama:hover {
            border-color: var(--manama-gold);
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.15);
            transform: translateY(-10px) scale(1.02);
        }

        .card-manama .brand-btn {
            background: var(--manama-gold);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .brand-logo {
            width: 200px;
            height: 120px;
            margin-bottom: 25px;
            object-fit: contain;
            border-radius: 0;
            background: transparent;
            padding: 0;
            border: none;
        }

        .brand-name {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .brand-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .brand-btn {
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mobile-break {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                height: auto;
                overflow-y: auto;
                padding: 40px 0;
            }

            .choices-grid {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }

            .brand-logo {
                width: 100%;
                height: 80px;
            }

            .brand-name {
                font-size: 1.2rem;
                line-height: 1.2;
            }

            .mobile-break {
                display: block;
            }

            .choice-card {
                padding: 20px 10px;
            }

            .brand-desc {
                display: none;
            }

            .brand-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }

            .welcome-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="welcome-container">
        <h1 class="welcome-title">اختر موقعك المفضل</h1>

        <div class="choices-grid">
            <!-- i Ticket Card -->
            <a href="/iticket" class="choice-card card-iticket">
                <img src="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/FINAL_LOGO%20copy-1.png"
                    class="brand-logo" style="background: white;">
                <div class="brand-name outfit">i Ticket <br class="mobile-break">Travel</div>
                <div class="brand-desc" id="iticket-desc">الرحلات الخارجية والمؤتمرات والسياحة الدولية. استمتع بأفضل
                    العروض حول العالم.
                </div>
                <div class="brand-btn">احجز الآن</div>
            </a>

            <!-- Manama Holidays Card -->
            <a href="/manama" class="choice-card card-manama">
                <img src="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/59879d329862954c3aeaac4b8a845a74144e7bb8/Screenshot%202026-03-20%20232636.png"
                    class="brand-logo" style="border-radius: 20px;">
                <div class="brand-name">Manama <br class="mobile-break">Holidays</div>
                <div class="brand-desc" id="manama-desc">اكتشف أرقى الفنادق، الشاليهات، والمنتجعات الاستثنائية في مملكة
                    البحرين. إقامتك
                    المثالية تبدأ هنا.</div>
                <div class="brand-btn"
                    style="background: var(--primary-red); box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);">احجز الآن
                </div>
            </a>
        </div>

        <p style="margin-top: 50px; color: #555;">جميع الحقوق محفوظة &copy; 2026</p>
    </div>

    <script>
        async function loadConfig() {
            try {
                const res = await fetch('/api/config?v=' + Date.now());
                const config = await res.json();
                if (config.iticket_desc) document.getElementById('iticket-desc').innerText = config.iticket_desc;
                if (config.manama_desc) document.getElementById('manama-desc').innerText = config.manama_desc;
            } catch (e) {
                console.error("Config load error:", e);
            }
        }
        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>

</html>
