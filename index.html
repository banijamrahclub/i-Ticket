<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i Ticket & Manama Holidays | الوجهة المثالية لخططك القادمة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Outfit:wght@300;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --manama-gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #111;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 40px 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .welcome-container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .welcome-title {
            font-size: 2.5rem;
            margin-bottom: 50px;
            font-weight: 800;
            animation: fadeInDown 1s ease;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .choice-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 50px 30px;
            text-decoration: none;
            color: white;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* i Ticket Theme */
        .card-iticket:hover {
            border-color: var(--primary-red);
            box-shadow: 0 0 50px rgba(230, 57, 70, 0.2);
            transform: translateY(-10px) scale(1.02);
        }

        .card-iticket .brand-btn {
            background: var(--primary-red);
        }

        /* Manama Theme */
        .card-manama:hover {
            border-color: var(--manama-gold);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            transform: translateY(-10px) scale(1.02);
        }

        .card-manama .brand-btn {
            background: var(--manama-gold);
        }

        .brand-logo {
            width: 200px;
            height: 120px;
            margin-bottom: 25px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .brand-desc {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .brand-btn {
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            body {
                height: auto;
                overflow-y: auto;
                padding: 40px 0;
            }

            .choices-grid {
                grid-template-columns: 1fr;
            }

            .welcome-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="welcome-container">
        <h1 class="welcome-title">اختر وجهتك المفضلة</h1>

        <div class="choices-grid">
            <!-- i Ticket Card -->
            <a href="/iticket" class="choice-card card-iticket">
                <img src="/uploads/iticket-logo.png" class="brand-logo" style="background: white;">
                <div class="brand-name outfit">i <b>Ticket</b></div>
                <div class="brand-desc">الرحلات الخارجية والمؤتمرات والسياحة الدولية. استمتع بأفضل العروض حول العالم.
                </div>
                <div class="brand-btn">اكتشف الآن</div>
            </a>

            <!-- Manama Holidays Card -->
            <a href="/manama" class="choice-card card-manama">
                <img src="/uploads/manama-logo.png" class="brand-logo" style="border-radius: 20px;">
                <div class="brand-name">Manama <b>Holidays</b></div>
                <div class="brand-desc">اكتشف أرقى الفنادق، الشاليهات، والمنتجعات الاستثنائية في مملكة البحرين. إقامتك
                    المثالية تبدأ هنا.</div>
                <div class="brand-btn">احجز إقامتك</div>
            </a>
        </div>

        <p style="margin-top: 50px; color: #555;">جميع الحقوق محفوظة &copy; 2024</p>
    </div>

</body>

</html>
