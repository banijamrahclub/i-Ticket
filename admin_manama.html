<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة Manama Holidays | فنادق وشاليهات</title>
    <script>
        (function() {
            if (sessionStorage.getItem('admin_pass') === '1357') return;
            document.documentElement.style.visibility = 'hidden';
            window.addEventListener('DOMContentLoaded', () => {
                const overlay = document.createElement('div');
                overlay.id = 'admin-lock-overlay';
                overlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:99999;color:white;font-family:Cairo,sans-serif;';
                overlay.innerHTML = `
                    <div style="background:#111;padding:40px;border-radius:24px;border:1px solid #e02b20;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);max-width:400px;width:90%;">
                        <i class="fa fa-lock" style="font-size:3rem;color:#e02b20;margin-bottom:20px;"></i>
                        <h2 style="margin-bottom:10px;">منطقة محمية</h2>
                        <p style="color:#888;margin-bottom:25px;">يرجى إدخال كلمة المرور للمتابعة</p>
                        <input type="password" id="admin-pass-input" placeholder="••••" style="width:100%;padding:15px;background:#222;border:1px solid #333;border-radius:12px;color:white;text-align:center;font-size:1.5rem;letter-spacing:5px;margin-bottom:20px;outline:none;box-sizing:border-box;">
                        <button onclick="checkAdminPass()" style="width:100%;padding:15px;background:#e02b20;color:white;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:1.1rem;transition:0.3s;">دخول النظام</button>
                        <p id="lock-error" style="color:#e02b20;margin-top:15px;display:none;">كلمة المرور غير صحيحة!</p>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.documentElement.style.visibility = 'visible';
                window.checkAdminPass = () => {
                    const val = document.getElementById('admin-pass-input').value;
                    if (val === '1357') {
                        sessionStorage.setItem('admin_pass', '1357');
                        overlay.remove();
                    } else {
                        document.getElementById('lock-error').style.display = 'block';
                        document.getElementById('admin-pass-input').value = '';
                    }
                };
                document.getElementById('admin-pass-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAdminPass();
                });
            });
        })();
    </script>
    <link rel="stylesheet" href="style.css?v=1.5">
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/Screenshot%202026-03-03%20001253.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f0f0f;
        }

        :root {
            --primary-red: #e02b20;
        }

        .admin-header h2 {
            color: #e02b20;
        }

        .btn-add {
            background: #e02b20;
        }

        .btn-add:hover {
            background: #b01b1b;
        }
    </style>
</head>

<body>

    <header class="scrolled">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/Screenshot%202026-03-03%20001253.png">
        </div>
        <nav>
            <ul>
                <li><a href="manama.html">معاينة الموقع</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <!-- Edit Description Section -->
        <div style="background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; display: flex; align-items: flex-end; gap: 20px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; color: #888; font-size: 0.9rem;">وصف العلامة التجارية (يظهر في صفحة اختيار الموقع)</label>
                <textarea id="brand-desc-input" placeholder="أدخل الوصف هنا..." style="width: 100%; height: 60px; background: #222; color: white; border: 1px solid #333; border-radius: 12px; padding: 12px; resize: none; font-family: Cairo; line-height: 1.4; outline: none;"></textarea>
            </div>
            <button onclick="saveBrandDesc()" id="save-desc-btn" style="background: var(--primary-red); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; height: 50px; display: flex; align-items: center; gap: 10px;">
                <i class="fa fa-save"></i> حفظ الوصف
            </button>
        </div>

        <div class="admin-header">
            <h2>إدارة الفنادق والشاليهات والاستراحات</h2>
            <button class="btn-add" id="open-add-modal"><i class="fa fa-plus"></i> إضافة عقار جديد</button>
        </div>

        <script>
            async function loadBrandDesc() {
                try {
                    const res = await fetch('/api/config');
                    const config = await res.json();
                    if (config.manama_desc) document.getElementById('brand-desc-input').value = config.manama_desc;
                } catch (e) { console.error(e); }
            }
            async function saveBrandDesc() {
                const btn = document.getElementById('save-desc-btn');
                const desc = document.getElementById('brand-desc-input').value;
                btn.disabled = true;
                btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';
                try {
                    const res = await fetch('/api/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ manama_desc: desc })
                    });
                    if (res.ok) alert('تم حفظ الوصف بنجاح');
                    else {
                        const errorRes = await res.json();
                        alert('حدث خطأ في الخادم: ' + (errorRes.error || 'خطأ غير معروف'));
                    }
                } catch (e) { alert('حدث خطأ في الشبكة: ' + e); }
                finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa fa-save"></i> حفظ الوصف';
                }
            }
            window.addEventListener('DOMContentLoaded', loadBrandDesc);
        </script>

        <div class="trips-table-container">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>النوع</th>
                        <th>السعر</th>
                        <th>المنطقة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="trips-list">
                    <!-- البيانات ستظهر هنا -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="trip-modal">
        <div class="modal-content">
            <h3 id="modal-title">إضافة عقار جديد</h3>
            <form id="trip-form">
                <input type="hidden" id="trip-id">
                <div class="form-group">
                    <label>اسم العقار (فندق/شاليه/استراحة)</label>
                    <input type="text" id="trip-name" required placeholder="مثلاً: شاليه الجبنة - الزلاق">
                </div>
                <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>النوع</label>
                        <select id="trip-type">
                            <option value="hotel_resort">فنادق ومنتجعات</option>
                            <option value="chalet_pool">شاليهات واستراحات</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>المنطقة (الزلاق، جزر الحوار، المحرق..)</label>
                        <input type="text" id="trip-category" placeholder="الموقع...">
                    </div>
                </div>
                <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>مدة الإقامة (يوم/ليلة)</label>
                        <input type="text" id="trip-duration" placeholder="مثلاً: يوم كامل">
                    </div>
                    <div class="form-group">
                        <label>مواصفات العقار (مسبح، مرافق..)</label>
                        <input type="text" id="trip-transport" placeholder="مسبح خاص، إطلالة بحر، إلخ..">
                    </div>
                </div>

                <div class="form-group"
                    style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px dashed #e02b20;">
                    <label style="color: #e02b20; font-weight: bold;">أسعار الحجز (يوم عادي، يوم عطلة، إلخ)</label>
                    <div id="price-categories-container"></div>
                    <button type="button" onclick="addPriceCategory()" class="btn-cancel"
                        style="font-size: 0.8rem; margin-top: 10px; width: 100%;">
                        <i class="fa fa-plus"></i> إضافة تصنيف سعر
                    </button>
                </div>

                <div class="form-group" style="margin-top:20px;">
                    <label>صور العقار (بحد أقصى 16)</label>
                    <input type="file" id="trip-images-file" accept="image/*" multiple>
                    <div id="images-preview-container"
                        style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; background: #222; padding: 10px; border-radius: 10px;">
                    </div>
                </div>

                <div class="form-group">
                    <label>الوصف التفصيلي (مطول)</label>
                    <textarea id="trip-description" rows="5" placeholder="اكتب تفاصيل الرحلة أو العقار هنا..." style="width: 100%; padding: 12px; background: #222; border: 1px solid #333; border-radius: 12px; color: white; resize: vertical;"></textarea>
                </div>
                <div class="form-group">
                    <label>تسمية التميز (Badge)</label>
                    <input type="text" id="trip-badge" placeholder="مثلاً: مميز بجوار البحر">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="close-modal">إلغاء</button>
                    <button type="submit" class="btn-add">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>

    <script>window.BRAND = 'manama';</script>
    <script src="admin.js"></script>
</body>

</html>
