<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة Manama Holidays | فنادق وشاليهات</title>
    <script>
        (function () {
            if (sessionStorage.getItem('admin_pass') === '1357') return;
            document.documentElement.style.visibility = 'hidden';
            window.addEventListener('DOMContentLoaded', () => {
                const overlay = document.createElement('div');
                overlay.id = 'admin-lock-overlay';
                overlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:99999;color:white;font-family:Cairo,sans-serif;';
                overlay.innerHTML = `
                    <div style="background:#111;padding:40px;border-radius:24px;border:1px solid #e02b20;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);max-width:400px;width:90%;">
                        <i class="fa fa-lock" style="font-size:3rem;color:#e02b20;margin-bottom:20px;"></i>
                        <h2 style="margin-bottom:10px;">منطقة محمية</h2>
                        <p style="color:#888;margin-bottom:25px;">يرجى إدخال كلمة المرور للمتابعة</p>
                        <input type="password" id="admin-pass-input" placeholder="••••" style="width:100%;padding:15px;background:#222;border:1px solid #333;border-radius:12px;color:white;text-align:center;font-size:1.5rem;letter-spacing:5px;margin-bottom:20px;outline:none;box-sizing:border-box;">
                        <button onclick="checkAdminPass()" style="width:100%;padding:15px;background:#e02b20;color:white;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:1.1rem;transition:0.3s;">دخول النظام</button>
                        <p id="lock-error" style="color:#e02b20;margin-top:15px;display:none;">كلمة المرور غير صحيحة!</p>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.documentElement.style.visibility = 'visible';
                window.checkAdminPass = () => {
                    const val = document.getElementById('admin-pass-input').value;
                    if (val === '1357') {
                        sessionStorage.setItem('admin_pass', '1357');
                        overlay.remove();
                    } else {
                        document.getElementById('lock-error').style.display = 'block';
                        document.getElementById('admin-pass-input').value = '';
                    }
                };
                document.getElementById('admin-pass-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAdminPass();
                });
            });
        })();
    </script>
    <link rel="stylesheet" href="style.css?v=1.5">
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/Screenshot%202026-03-03%20001253.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f0f0f;
        }

        :root {
            --primary-red: #e02b20;
        }

        .admin-header h2 {
            color: #e02b20;
        }

        .btn-add {
            background: #e02b20;
        }

        .btn-add:hover {
            background: #b01b1b;
        }

        .cat-input {
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <header class="scrolled">
        <div class="logo">
            <img
                src="https://raw.githubusercontent.com/banijamrahclub/i-Ticket-photo/1a5d9f0f31afff135fab6abd24f863d0a418b223/Screenshot%202026-03-03%20001253.png">
        </div>
        <nav>
            <ul>
                <li><a href="manama.html">معاينة الموقع</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container" style="padding: 40px 5%; margin-top: 80px;">

        <!-- Manage Categories Section -->
        <div
            style="background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: #5bc0de;"><i class="fa fa-map-location-dot"></i> إدارة أنواع الخدمات
                    والأماكن</h3>
                <button onclick="addNewCategoryRow()"
                    style="background: rgba(255,255,255,0.05); color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;">
                    <i class="fa fa-plus"></i> إضافة نوع جديد
                </button>
            </div>

            <div id="categories-manage-container"
                style="display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 20px;">
                <!-- ستظهر التصنيفات هنا من الإعدادات -->
            </div>

            <div style="text-align: left;">
                <button onclick="saveCategories()" id="save-cats-btn"
                    style="background: #5bc0de; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; margin-right: auto;">
                    <i class="fa fa-save"></i> حفظ جميع الأنواع
                </button>
            </div>
        </div>

        <!-- Edit Description Section -->
        <div
            style="background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; display: flex; align-items: flex-end; gap: 20px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; color: #888; font-size: 0.9rem;">وصف العلامة التجارية
                    (يظهر في صفحة اختيار الموقع)</label>
                <textarea id="brand-desc-input" placeholder="أدخل الوصف هنا..."
                    style="width: 100%; height: 60px; background: #222; color: white; border: 1px solid #333; border-radius: 12px; padding: 12px; resize: none; font-family: Cairo; line-height: 1.4; outline: none;"></textarea>
            </div>
            <button onclick="saveBrandDesc()" id="save-desc-btn"
                style="background: var(--primary-red); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; height: 50px; display: flex; align-items: center; gap: 10px;">
                <i class="fa fa-save"></i> حفظ الوصف
            </button>
        </div>

        <div class="admin-header"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>إدارة الفنادق والشاليهات والاستراحات</h2>
            <button class="btn-add" id="open-add-modal"
                style="background: var(--primary-red); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 700;"><i
                    class="fa fa-plus"></i> إضافة عقار جديد</button>
        </div>

        <div class="trips-table-container">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>النوع</th>
                        <th>السعر</th>
                        <th>المنطقة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="trips-list">
                    <!-- البيانات ستظهر هنا -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="trip-modal">
        <div class="modal-content">
            <h3 id="modal-title">إضافة عقار جديد</h3>
            <form id="trip-form">
                <input type="hidden" id="trip-id">
                <div class="form-group">
                    <label>اسم العقار (فندق/شاليه/استراحة)</label>
                    <input type="text" id="trip-name" required placeholder="مثلاً: شاليه الجبنة - الزلاق">
                </div>
                <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>النوع</label>
                        <select id="trip-type">
                            <!-- سيتم ملؤه ديناميكياً -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>المنطقة (الزلاق، جزر الحوار، المحرق..)</label>
                        <input type="text" id="trip-category" placeholder="الموقع...">
                    </div>
                </div>
                <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>مدة الإقامة (يوم/ليلة)</label>
                        <input type="text" id="trip-duration" placeholder="مثلاً: يوم كامل">
                    </div>
                    <div class="form-group">
                        <label>مواصفات العقار (مسبح، مرافق..)</label>
                        <input type="text" id="trip-transport" placeholder="مسبح خاص، إطلالة بحر، إلخ..">
                    </div>
                </div>

                <div class="form-group"
                    style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px dashed #e02b20;">
                    <label style="color: #e02b20; font-weight: bold;">أسعار الحجز (يوم عادي، يوم عطلة، إلخ)</label>
                    <div id="price-categories-container"></div>
                    <button type="button" onclick="addPriceCategory()" class="btn-cancel"
                        style="font-size: 0.8rem; margin-top: 10px; width: 100%;">
                        <i class="fa fa-plus"></i> إضافة تصنيف سعر
                    </button>
                </div>


                <div class="form-group"
                    style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px dashed #e02b20;">
                    <label style="color: #e02b20; font-weight: bold;">أقسام الصور الإضافية</label>
                    <div id="gallery-groups-container"></div>
                    <button type="button" onclick="addNewGalleryGroup()" class="btn-cancel"
                        style="font-size: 0.8rem; margin-top: 10px; width: 100%; border: 1px solid #444;">
                        <i class="fa fa-plus"></i> إضافة قسم صور جديد
                    </button>
                </div>

                <div class="form-group">
                    <label>الوصف التفصيلي (مطول)</label>
                    <textarea id="trip-description" rows="5" placeholder="اكتب تفاصيل الرحلة أو العقار هنا..."
                        style="width: 100%; padding: 12px; background: #222; border: 1px solid #333; border-radius: 12px; color: white; resize: vertical;"></textarea>
                </div>
                <div class="form-group">
                    <label>تسمية التميز (Badge)</label>
                    <input type="text" id="trip-badge" placeholder="مثلاً: مميز بجوار البحر">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="close-modal">إلغاء</button>
                    <button type="submit" class="btn-add">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let manamaCategories = [];

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                if (config.manama_desc) document.getElementById('brand-desc-input').value = config.manama_desc;

                manamaCategories = config.manama_categories || [
                    { id: 'hotels', label: 'فنادق', icon: 'fa-hotel' },
                    { id: 'resorts', label: 'منتجع', icon: 'fa-umbrella-beach' },
                    { id: 'chalets', label: 'شاليهات', icon: 'fa-house-chimney' },
                    { id: 'rest_houses', label: 'استراحات', icon: 'fa-tree' },
                    { id: 'jacuzzi', label: 'جاكوزي', icon: 'fa-hot-tub-person' },
                    { id: 'romantic_dinner', label: 'عشاء رومانسي', icon: 'fa-utensils' },
                    { id: 'sea_trips', label: 'رحلات بحرية', icon: 'fa-ship' },
                    { id: 'horse_riding', label: 'ركوب الخيل', icon: 'fa-horse' },
                    { id: 'limo', label: 'ليموزين', icon: 'fa-car-side' },
                    { id: 'coordination', label: 'تنسيق', icon: 'fa-cake-candles' }
                ];
                renderCategoryManagement();
                populateTypeDropdown();
            } catch (e) { console.error(e); }
        }

        function guessIcon(label) {
            const l = label.toLowerCase();
            if (l.includes('فندق') || l.includes('فنادق') || l.includes('سكن')) return 'fa-hotel';
            if (l.includes('منتجع')) return 'fa-umbrella-beach';
            if (l.includes('شاليه') || l.includes('استراحة') || l.includes('مزرعة') || l.includes('بيت')) return 'fa-house-chimney';
            if (l.includes('بحر') || l.includes('شاطئ') || l.includes('بحرية')) return 'fa-ship';
            if (l.includes('جاكوزي') || l.includes('مسبح')) return 'fa-hot-tub-person';
            if (l.includes('عشاء') || l.includes('مطعم')) return 'fa-utensils';
            if (l.includes('خيل') || l.includes('ركوب')) return 'fa-horse';
            if (l.includes('طيران')) return 'fa-plane';
            if (l.includes('عرض') || l.includes('عروض')) return 'fa-tags';
            if (l.includes('تأشير') || l.includes('فيزا')) return 'fa-stamp';
            if (l.includes('سارة') || l.includes('ليموزين') || l.includes('توصيل')) return 'fa-car-side';
            if (l.includes('تنسيق') || l.includes('ترتيب') || l.includes('حفلة')) return 'fa-cake-candles';
            return 'fa-location-dot';
        }

        function renderCategoryManagement() {
            const container = document.getElementById('categories-manage-container');
            if (!container) return;
            container.innerHTML = `
                <div style="color: #888; font-size: 0.8rem;">اسم النوع</div>
                <div></div>
            ` + manamaCategories.map((cat, idx) => `
                <div style="position:relative;">
                    <input type="text" class="cat-label cat-input" value="${cat.label}" placeholder="مثال: شاليهات فاخرة">
                    <input type="hidden" class="cat-id" value="${cat.id}">
                    <input type="hidden" class="cat-icon" value="${cat.icon || 'fa-location-dot'}">
                </div>
                <button onclick="removeCategoryRow(${idx})" style="background:rgba(231, 76, 60, 0.1); color:#e74c3c; border:none; border-radius:12px; padding:0 20px; cursor:pointer;"><i class="fa fa-trash"></i></button>
            `).join('');
        }

        function addNewCategoryRow() {
            manamaCategories.push({ id: '', label: '', icon: 'fa-location-dot' });
            renderCategoryManagement();
        }

        function removeCategoryRow(idx) {
            if (manamaCategories.length <= 1) return alert('يجب وجود نوع واحد على الأقل');
            manamaCategories.splice(idx, 1);
            renderCategoryManagement();
        }

        async function saveCategories() {
            const btn = document.getElementById('save-cats-btn');
            const labels = document.querySelectorAll('.cat-label');
            const ids = document.querySelectorAll('.cat-id');
            const icons = document.querySelectorAll('.cat-icon');

            const updatedCats = [];
            for (let i = 0; i < labels.length; i++) {
                let label = labels[i].value.trim();
                if (!label) continue;
                let id = ids[i].value || 'mc_' + Math.random().toString(36).substr(2, 9);
                let icon = icons[i].value;
                if (!icon || icon === 'fa-location-dot') {
                    icon = guessIcon(label);
                }
                updatedCats.push({ label, id, icon });
            }

            btn.disabled = true;
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ manama_categories: updatedCats })
                });
                if (res.ok) {
                    alert('تم الحفظ بنجاح');
                    manamaCategories = updatedCats;
                    renderCategoryManagement();
                    populateTypeDropdown();
                }
            } catch (e) { alert(e); }
            finally { btn.disabled = false; }
        }

        function populateTypeDropdown() {
            const select = document.getElementById('trip-type');
            if (!select) return;
            select.innerHTML = manamaCategories.map(cat => `<option value="${cat.id}">${cat.label}</option>`).join('');
            window.manamaCategories = manamaCategories; // For admin.js access
        }

        async function saveBrandDesc() {
            const btn = document.getElementById('save-desc-btn');
            const desc = document.getElementById('brand-desc-input').value;
            btn.disabled = true;
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ manama_desc: desc })
                });
                if (res.ok) alert('تم حفظ الوصف بنجاح');
            } catch (e) { alert(e); }
            finally { btn.disabled = false; }
        }

        window.addEventListener('DOMContentLoaded', loadConfig);
    </script>

    <script>window.BRAND = 'manama';</script>
    <script src="admin.js"></script>
</body>

</html>
